<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-install-referrer Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>@capgo/capacitor-install-referrer</h1>
      <p class="lead">Read native install attribution details.</p>

      <label class="check-row" for="fetch-apple-attribution">
        <input id="fetch-apple-attribution" type="checkbox" />
        Fetch Apple attribution payload on iOS
      </label>

      <div class="actions">
        <button id="get-referrer">Get referrer</button>
        <button id="get-version">Get plugin version</button>
      </div>

      <pre id="plugin-output">Press a button to run an action.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
